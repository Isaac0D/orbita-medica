<body>
    <header id="main-header"></header>

    <section class="hero-internal hero-reserva" style="background-image: url('./imgs/portadaReserva.webp');">
        <div class="overlay"></div>
        <div class="hero-internal-content reveal">
            <h1>RESERVA TU FECHA</h1>
            <p>Da el siguiente paso y comparte tu conocimiento</p>
        </div>
    </section>

    <section class="section-padding contact-section" style="background-image: url('./imgs/contactBack.webp');">
        <div class="container contact-grid">
            
            <div class="contact-info reveal">
                <h2>Amplifica tu voz médica</h2> 
                <p>Completa el formulario y nuestro equipo de producción se pondrá en contacto contigo para coordinar los detalles de tu episodio.</p>
                
                <div class="contact-details">
                    <!-- <div class="detail-item">
                        <span class="icon">📍</span>
                        <p><strong>Estudio Órbita:</strong><br>Av. Tecnológico #123, Ciudad Juárez.</p>
                    </div> -->
                    <div class="detail-item">
                        <span class="icon">📧</span>
                        <a href="mailto:hello@angelcorral.ai"><strong>Email:</strong><br>hello@angelcorral.ai</a>
                    </div>
                    <div class="detail-item">
                        <span class="icon">📱</span>
                        <a href="https://wa.me/526561431434" target="_blank"><strong>WhatsApp:</strong><br>+52 (656)-143-1434</a>
                    </div>
                </div>
            </div>

            <div class="form-wrapper reveal">
                <form action="enviar.php" method="POST" class="booking-form">
                    
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Dr. Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="especialidad">Especialidad</label>
                        <input type="text" id="especialidad" name="especialidad" placeholder="Ej. Cardiología, Nutrición..." required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="(000) 000-0000" required>
                        </div>
                        <div class="form-group">
                            <label for="correo">Correo Electrónico</label>
                            <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="¿Tienes algún tema en mente o alguna duda específica?"></textarea>
                    </div>

                    <button type="submit" class="btn-primary btn-block">Enviar Solicitud</button>
                </form>
            </div>

        </div>
    </section>

    <section class="bottom-banner reveal">
        <img src="./imgs/micsImg.webp" alt="mics">
